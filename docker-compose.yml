services:

  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - grafana-storage:/var/lib/grafana

  snmp-exporter:
    image: prom/snmp-exporter:latest
    restart: unless-stopped
    ports:
      - "9116:9116"

volumes:
  grafana-storage:

global:
  scrape_interval: 15s

scrape_configs:

  - job_name: 'snmp-core1'
    static_configs:
      - targets: ['10.10.12.2']
    metrics_path: /snmp
    params:
      module: [if_mib]
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - target_label: __address__
        replacement: snmp-exporter:9116

  - job_name: 'snmp-core2'
    static_configs:
      - targets: ['10.10.13.2']
    metrics_path: /snmp
    params:
